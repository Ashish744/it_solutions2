<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylish Login Page</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
    }

    .login-page {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 50px; /* reduced since no nav */
      padding: 20px;
      box-sizing: border-box;
    }

    .home-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .home-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      background: linear-gradient(135deg, #764ba2, #667eea);
    }

    .home-btn i {
      font-size: 16px;
    }


    .login-container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 40px;
      width: 350px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease-in-out;
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #fff;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #eee;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-size: 14px;
      transition: background 0.3s, transform 0.2s;
    }

    .input-group input:focus {
      background: rgba(255,255,255,0.3);
      outline: none;
      transform: scale(1.02);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #43cea2, #185a9d);
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    .extra-links {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
    }

    .extra-links a {
      color: #fff;
      text-decoration: none;
      transition: color 0.3s;
    }

    .extra-links a:hover {
      color: #43cea2;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes loginJump {
      0% {
        transform: translateY(0) scale(1);
      }
      40% {
        transform: translateY(-10px) scale(1.05);
      }
      70% {
        transform: translateY(-4px) scale(1.02);
      }
      100% {
        transform: translateY(-6px) scale(1.03);
      }
    }
    /* Base styles already defined for desktop */

/* Tablet screens (≤ 992px) */
@media (max-width: 992px) {
  .login-container {
    width: 80%;
    padding: 30px;
  }

  .login-container h2 {
    font-size: 1.8rem;
  }

  .input-group input {
    font-size: 15px;
    padding: 10px;
  }

  .btn {
    font-size: 15px;
    padding: 10px;
  }
}

/* Mobile screens (≤ 768px) */
@media (max-width: 768px) {
  body {
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .login-container {
    width: 100%;
    padding: 25px;
    border-radius: 12px;
  }

  .login-container h2 {
    font-size: 1.5rem;
  }

  .input-group label {
    font-size: 13px;
  }

  .input-group input {
    font-size: 14px;
    padding: 8px;
  }

  .btn {
    font-size: 14px;
    padding: 10px;
  }

  .extra-links {
    font-size: 13px;
  }
}

/* Very small screens (≤ 480px) */
@media (max-width: 480px) {
  .login-container {
    padding: 20px;
  }

  .login-container h2 {
    font-size: 1.3rem;
  }

  .btn {
    font-size: 13px;
    padding: 8px;
  }

  .extra-links {
    font-size: 12px;
  }
}

/* Modal Styles */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2000;
}

.modal.show {
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6);
  animation: fadeIn 0.3s ease;
}

.modal-content {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 40px;
  width: 400px;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
  position: relative;
  z-index: 2001;
  animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.modal-content h2 {
  text-align: center;
  color: #fff;
  margin-bottom: 25px;
  font-weight: 600;
  font-size: 24px;
}

.modal-close {
  position: absolute;
  top: 15px;
  right: 15px;
  background: none;
  border: none;
  font-size: 32px;
  color: #fff;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.modal-close:hover {
  transform: scale(1.2) rotate(90deg);
}

.signup-form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.signup-form .input-group {
  margin-bottom: 0;
}

.signup-form input {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.2);
  color: #fff;
  font-size: 14px;
  transition: background 0.3s, transform 0.2s;
}

.signup-form input::placeholder {
  color: rgba(255, 255, 255, 0.7);
}

.signup-form input:focus {
  background: rgba(255, 255, 255, 0.3);
  outline: none;
  transform: scale(1.02);
}

.modal-btn {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #43cea2, #185a9d);
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.3s;
}

.modal-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
}

.modal-btn:active {
  transform: translateY(0);
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(50px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@media (max-width: 768px) {
  .modal-content {
    width: 90%;
    max-width: 350px;
    padding: 30px;
  }
}

  </style>
</head>
<body>
<a href="index.html" class="home-btn">
  <i class="fas fa-home"></i> Home
</a>

<div class="login-page">
  <div class="login-container">
    <h2>Welcome Back</h2>
    <form>
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn">Login</button>
    </form>
    <div class="extra-links">
      <p><a href="404.html">Forgot Password?</a></p>
      <br>
      <p>New here? <a href="#" id="createAccountBtn">Create Account</a></p>
    </div>
    </div>
  </div>

  <!-- Create Account Modal -->
  <div id="createAccountModal" class="modal">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-content">
      <button class="modal-close" id="closeModal">&times;</button>
      <h2>Create Account</h2>
      <form class="signup-form">
        <div class="input-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" placeholder="Enter your full name" required>
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="input-group">
          <label for="newpassword">Password</label>
          <input type="password" id="newpassword" placeholder="Create a password" required>
        </div>
        <div class="input-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Confirm your password" required>
        </div>
        <button type="submit" class="modal-btn">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    const createAccountBtn = document.getElementById('createAccountBtn');
    const modal = document.getElementById('createAccountModal');
    const closeModal = document.getElementById('closeModal');
    const modalOverlay = document.getElementById('modalOverlay');

    createAccountBtn.addEventListener('click', (e) => {
      e.preventDefault();
      modal.classList.add('show');
    });

    closeModal.addEventListener('click', () => {
      modal.classList.remove('show');
    });

    modalOverlay.addEventListener('click', () => {
      modal.classList.remove('show');
    });

    const signupForm = document.querySelector('.signup-form');
    signupForm.addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Account created successfully!');
      modal.classList.remove('show');
      signupForm.reset();
    });
  </script>

</body>
</html>
