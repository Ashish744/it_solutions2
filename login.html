<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylish Login Page</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 40px;
      width: 350px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease-in-out;
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #fff;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #eee;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-size: 14px;
      transition: background 0.3s, transform 0.2s;
    }

    .input-group input:focus {
      background: rgba(255,255,255,0.3);
      outline: none;
      transform: scale(1.02);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #43cea2, #185a9d);
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    .extra-links {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
    }

    .extra-links a {
      color: #fff;
      text-decoration: none;
      transition: color 0.3s;
    }

    .extra-links a:hover {
      color: #43cea2;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Base styles already defined for desktop */

/* Tablet screens (≤ 992px) */
@media (max-width: 992px) {
  .login-container {
    width: 80%;
    padding: 30px;
  }

  .login-container h2 {
    font-size: 1.8rem;
  }

  .input-group input {
    font-size: 15px;
    padding: 10px;
  }

  .btn {
    font-size: 15px;
    padding: 10px;
  }
}

/* Mobile screens (≤ 768px) */
@media (max-width: 768px) {
  body {
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .login-container {
    width: 100%;
    padding: 25px;
    border-radius: 12px;
  }

  .login-container h2 {
    font-size: 1.5rem;
  }

  .input-group label {
    font-size: 13px;
  }

  .input-group input {
    font-size: 14px;
    padding: 8px;
  }

  .btn {
    font-size: 14px;
    padding: 10px;
  }

  .extra-links {
    font-size: 13px;
  }
}

/* Very small screens (≤ 480px) */
@media (max-width: 480px) {
  .login-container {
    padding: 20px;
  }

  .login-container h2 {
    font-size: 1.3rem;
  }

  .btn {
    font-size: 13px;
    padding: 8px;
  }

  .extra-links {
    font-size: 12px;
  }
}

  </style>
</head>
<body>



  <div class="login-container">
    <h2>Welcome Back</h2>
    <form>
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn">Login</button>
    </form>
    <div class="extra-links">
      <p><a href="#">Forgot Password?</a></p>
      <p>New here? <a href="#">Create Account</a></p>
    </div>
  </div>
</body>
</html>
